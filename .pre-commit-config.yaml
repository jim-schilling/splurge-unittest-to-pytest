repos:
  - repo: local
    hooks:
      - id: ruff
        name: ruff (system)
        entry: ruff
        language: system
        types: [python]
        args: ["check", "--fix"]

      - id: mypy
        name: mypy (system)
        entry: mypy
        language: system
        types: [python]
        args: ["-p", "splurge_unittest_to_pytest"]

      - id: pytest-unit
        name: pytest unit tests (system)
        entry: pytest
        language: system
        types: [python]
        args: ["-q", "tests/unit"]
