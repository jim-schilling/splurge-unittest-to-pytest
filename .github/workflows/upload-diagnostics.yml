name: Upload diagnostics artifacts

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  pr-trigger-check:
    name: PR trigger check
    runs-on: ubuntu-latest
    outputs:
      allow_ci: ${{ steps.check.outputs.allow_ci }}
    steps:
      - name: Determine whether to run CI
        id: check
        run: |
          echo "actor=${GITHUB_ACTOR}"
          allow=true
          if [ "${GITHUB_ACTOR}" = "github-actions[bot]" ] || [ "${GITHUB_ACTOR}" = "github-actions" ]; then
            allow=false
          fi
          last_msg=$(git log -1 --pretty=%B || true)
          if echo "$last_msg" | grep -q "^chore(ci)"; then
            allow=false
          fi
          echo "::set-output name=allow_ci::$allow"

  tests-with-diagnostics:
    needs: [pr-trigger-check]
    if: needs.pr-trigger-check.outputs.allow_ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Enable diagnostics
        run: |
          echo "SPLURGE_ENABLE_DIAGNOSTICS=1" >> $GITHUB_ENV
          # Use a workspace-local diagnostics root
          echo "SPLURGE_DIAGNOSTICS_ROOT=$GITHUB_WORKSPACE/tmp_diagnostics" >> $GITHUB_ENV

      - name: Show diagnostics root
        run: |
          echo "Diagnostics root: $SPLURGE_DIAGNOSTICS_ROOT"
          ls -la "$SPLURGE_DIAGNOSTICS_ROOT" || true

      - name: Run tests
        run: |
          pytest -q || true

      - name: Upload diagnostics artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: splurge-diagnostics
          path: ${{ github.workspace }}/tmp_diagnostics
