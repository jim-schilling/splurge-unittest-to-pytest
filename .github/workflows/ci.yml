name: CI

on:
  pull_request:
    branches: [ main, update-2025.0.1 ]
  push:
    branches: [ main, update-2025.0.1 ]

jobs:
  quick:
    name: Quick checks (lint, type, tests)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Run ruff
        run: ruff check .

      - name: Run mypy
        run: mypy splurge_unittest_to_pytest || true

      - name: Run unit tests (no coverage)
        run: |
          pytest -q -o addopts= -p no:pytest_cov tests/unit

  # coverage job moved to .github/workflows/coverage.yml
