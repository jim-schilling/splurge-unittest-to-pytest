name: CI

on:
  pull_request:
    branches: [ main, update-2025.0.0 ]
  push:
    branches: [ main, update-2025.0.0 ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.10, 3.11, 3.12]

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Run ruff
        run: ruff check .

      - name: Run mypy
        run: mypy splurge_unittest_to_pytest || true

      - name: Run tests
        run: pytest -q
