name: Update coverage badge

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  update-coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests with coverage
        run: |
          pytest --cov=splurge_unittest_to_pytest --cov-report=xml:reports/coverage.xml

      - name: Update README coverage badge
        run: |
          python tools/update_coverage_badge.py --coverage reports/coverage.xml --readme README.md

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create branch and commit
        run: |
          BRANCH=ci-coverage
          git checkout -b $BRANCH || git checkout $BRANCH
          git add README.md
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore(ci): update coverage badge from latest run"
          git push --set-upstream origin $BRANCH --force

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(ci): update coverage badge from latest run"
          branch: ci-coverage
          base: main
          title: "chore(ci): update coverage badge"
          body: |
            This PR updates the coverage badge in the README using the latest
            coverage report generated on merge to `main`.
